[book]
title = "aiscope"
authors = ["aiscope contributors"]
description = "DevTools for your AI coding tools' memory."
language = "en"
src = "src"
multilingual = false

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Jayanth-MKV/aiscope"
edit-url-template = "https://github.com/Jayanth-MKV/aiscope/edit/main/docs/{path}"
site-url = "/aiscope/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
expand = true
heading-split-level = 3
