name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

  - type: input
    id: version
    attributes:
      label: aiscope version
      description: Output of `aiscope --version`
      placeholder: aiscope 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / macOS 14.4 / Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        A minimal repo layout or commands we can run to reproduce the issue.
        Please redact anything sensitive — aiscope reads files in the repo.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Output
      description: Output of `aiscope --diag .` or the relevant command.
      render: shell
